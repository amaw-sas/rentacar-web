name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  NODE_VERSION: '20'

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint - All packages
        run: pnpm lint
        continue-on-error: true

      # Issue 322 PR3 — run unit suites for all packages, not only logic.
      # A failure in any package fails the job (no continue-on-error).
      - name: Unit tests - Logic
        run: pnpm --filter @rentacar-main/logic test

      - name: Unit tests - ui-alquilatucarro
        run: pnpm --filter ui-alquilatucarro test

      - name: Unit tests - ui-alquilame
        run: pnpm --filter ui-alquilame test

      - name: Unit tests - ui-alquicarros
        run: pnpm --filter ui-alquicarros test

      # Issue 374 — the e2e suite silently collected ZERO specs in all three
      # brands from the initial commit onward: `__dirname` in an ESM spec threw
      # at collection time and Playwright aborted the whole run before executing
      # anything. It went unnoticed because the e2e job below names spec files
      # explicitly, which filters the broken file out.
      #
      # `--list` neither launches browsers nor starts the dev server, so this is
      # cheap and needs no secrets — it belongs here, in the job that always
      # runs, rather than in the secret-gated e2e job. It guards the invariant
      # (the suite collects) instead of one cause of breaking it, so any future
      # collection-time error — syntax, bad import, missing module — fails here.
      #
      # The floors are minimums, not equalities, so adding specs never breaks
      # CI. A total collapse already exits non-zero, so "> 0" would be dead
      # code; the floors exist for PARTIAL erosion, which fails SILENTLY —
      # widening a testIgnore glob or renaming a file off testMatch drops specs
      # while Playwright still exits 0. Deliberate reductions are supposed to
      # cost an explicit, reviewable edit here.
      #
      # Floors measured 2026-07-22: alquilatucarro 1105/42, alquicarros 800/30,
      # alquilame 800/30. The two smaller brands share BUSCAR_VEHICULOS_FLOW_SPECS
      # (12 ignored specs), which is why 42 - 12 = 30.
      - name: E2E suite must collect specs (all brands)
        run: |
          set -euo pipefail
          for brand in alquilatucarro alquicarros alquilame; do
            case $brand in
              alquilatucarro)          min_tests=1000; min_files=42 ;;
              alquicarros|alquilame)   min_tests=750;  min_files=30 ;;
            esac
            echo "::group::Collecting e2e specs for $brand"
            output=$(BRAND=$brand pnpm exec playwright test --list --reporter=list 2>&1) || {
              echo "::endgroup::"
              echo "$output"
              echo "::error title=E2E collection failed::BRAND=$brand could not collect the e2e suite."
              exit 1
            }
            echo "$output" | tail -1
            echo "::endgroup::"
            summary=$(echo "$output" | sed -n 's/^Total: \([0-9]\+\) tests\? in \([0-9]\+\) files\?$/\1 \2/p' | tail -1)
            if [ -z "$summary" ]; then
              echo "::error title=E2E collection unparsable::BRAND=$brand — Playwright's summary line did not match the expected shape, so the guard cannot prove the suite collects. Check whether the reporter output changed."
              exit 1
            fi
            count=${summary% *}
            files=${summary#* }
            if [ "$count" -lt "$min_tests" ] || [ "$files" -lt "$min_files" ]; then
              echo "::error title=E2E collection shrank::BRAND=$brand collected $count tests in $files files, below the floor of $min_tests tests / $min_files files. Specs stopped being collected. If the reduction is deliberate, lower the floor in this step."
              exit 1
            fi
            echo "$brand: $count tests in $files files (floor $min_tests/$min_files)"
          done

  # Issue 322 SCEN-322-N04 — reservation-payload e2e specs in CI.
  #
  # Runs the alquicarros wizard payload specs (deterministic page.route stubs
  # for /api/reservations/availability and /record) against a real dev server.
  # The server itself needs Supabase (NUXT_SUPABASE_URL / NUXT_SUPABASE_ANON_KEY)
  # because /api/rentacar-data — category/branch metadata — is fetched
  # server-side during SSR and CANNOT be stubbed with page.route. Without it
  # every spec self-skips ("metadata de gamas no disponible") and a green run
  # would be vacuous.
  #
  # Honesty contract:
  # - If the repo secrets are missing, the job SKIPS the e2e steps with a
  #   visible warning annotation instead of faking a meaningful green.
  # - If the secrets exist, the run must produce at least one PASSED test —
  #   an all-skipped result fails the job (no vacuous green).
  # - No continue-on-error anywhere: a failing spec fails the pipeline.
  e2e-reservation-payload:
    name: E2E Reservation Payload (alquicarros)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Supabase secrets
        id: gate
        env:
          SUPABASE_URL: ${{ secrets.NUXT_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NUXT_SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=E2E skipped::Repo secrets NUXT_SUPABASE_URL / NUXT_SUPABASE_ANON_KEY are not configured. The reservation-payload e2e specs need them for the dev server's /api/rentacar-data (SSR, not stubbable via page.route). Add both secrets to enable this job."
          fi

      - name: Setup Node.js
        if: steps.gate.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        if: steps.gate.outputs.available == 'true'
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        if: steps.gate.outputs.available == 'true'
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm
        if: steps.gate.outputs.available == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        if: steps.gate.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: steps.gate.outputs.available == 'true'
        run: pnpm exec playwright install --with-deps chromium

      # The brand dev script reads ../../.env.local (pnpm --filter ui-alquicarros
      # dev, spawned by Playwright's webServer). Materialize the secrets there.
      - name: Write .env.local for the dev server
        if: steps.gate.outputs.available == 'true'
        env:
          SUPABASE_URL: ${{ secrets.NUXT_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NUXT_SUPABASE_ANON_KEY }}
        run: |
          {
            echo "NUXT_SUPABASE_URL=$SUPABASE_URL"
            echo "NUXT_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
          } > .env.local

      - name: Run reservation payload e2e specs
        if: steps.gate.outputs.available == 'true'
        env:
          BRAND: alquicarros
          PLAYWRIGHT_JSON_OUTPUT_NAME: pw-report.json
        run: >
          pnpm exec playwright test --project=chromium --reporter=list,json
          e2e/alquicarros-reserva-mensual.spec.ts
          e2e/alquicarros-reservation-wizard.spec.ts

      # Anti-vacuous guard: with Supabase reachable, at least one test must
      # PASS. An all-skipped run means the metadata never loaded — that is a
      # broken environment, not a green result.
      - name: Fail if the run was vacuous (all specs skipped)
        if: steps.gate.outputs.available == 'true'
        run: |
          passed=$(jq '.stats.expected' pw-report.json)
          skipped=$(jq '.stats.skipped' pw-report.json)
          echo "passed=$passed skipped=$skipped"
          if [ "$passed" -lt 1 ]; then
            echo "::error title=Vacuous e2e run::0 tests passed ($skipped skipped). The dev server could not load Supabase metadata — the run proves nothing."
            exit 1
          fi

      - name: Upload Playwright report on failure
        if: failure() && steps.gate.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-reservation-payload
          path: e2e-results/
          retention-days: 7
